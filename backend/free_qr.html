{% extends "base.html" %}

{% block title %}Free QR Code Generator - AssetMS{% endblock %}

{% block content %}
<div class="container" style="margin-top: 3rem; margin-bottom: 3rem;">
    <div class="auth-card" style="max-width: 900px; margin: 0 auto; background: white; padding: 3rem; border-radius: 8px; box-shadow: var(--shadow);">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary-color);">Free QR Code Generator</h2>
            <p class="auth-subtext">Create custom QR codes instantly. Print or download in high quality.</p>
        </div>

        <div class="qr-generator-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
            
            <!-- Controls -->
            <div class="qr-controls">
                <div class="form-group">
                    <label for="qr-data">Data (URL, Text, ID, etc.)</label>
                    <input type="text" id="qr-data" class="full-width" placeholder="https://example.com" value="">
                </div>
                
                <div class="form-group">
                    <label for="qr-size">Size</label>
                    <select id="qr-size" class="full-width">
                        <option value="150">Small (150px)</option>
                        <option value="250" selected>Medium (250px)</option>
                        <option value="350">Large (350px)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="qr-color">Color</label>
                    <input type="color" id="qr-color" value="#000000" style="width: 100%; height: 45px; cursor: pointer;">
                </div>

                <button onclick="generateQR()" class="btn-primary full-width">
                    <i class="fas fa-qrcode"></i> Generate QR
                </button>
            </div>

            <!-- Output -->
            <div class="qr-output" style="text-align: center; background: var(--secondary-color); padding: 2rem; border-radius: 8px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                
                <div id="qr-placeholder" style="color: var(--text-light);">
                    <i class="fas fa-arrow-left" style="margin-right: 5px;"></i> Enter data and click Generate
                </div>

                <div id="qr-result" style="display: none; width: 100%;">
                    <div id="qrcode-container" style="background: white; padding: 1rem; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1);"></div>
                    
                    <div class="qr-actions" style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 1rem;">
                        <button onclick="downloadQR()" class="btn-nav-outline" title="Download PNG">
                            <i class="fas fa-download"></i> Download
                        </button>
                        <button onclick="printQR()" class="btn-nav-outline" title="Print QR">
                            <i class="fas fa-print"></i> Print
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- QR Code JS Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    let qrCodeObj = null;

    function generateQR() {
        const data = document.getElementById('qr-data').value;
        const size = parseInt(document.getElementById('qr-size').value);
        const color = document.getElementById('qr-color').value;
        const container = document.getElementById('qrcode-container');
        const resultDiv = document.getElementById('qr-result');
        const placeholder = document.getElementById('qr-placeholder');

        if (!data) {
            alert("Please enter data to generate QR code.");
            return;
        }

        // Reset UI
        container.innerHTML = "";
        placeholder.style.display = "none";
        resultDiv.style.display = "block";

        // Generate QR
        qrCodeObj = new QRCode(container, {
            text: data,
            width: size,
            height: size,
            colorDark : color,
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function getQRDataUrl() {
        const img = document.querySelector("#qrcode-container img");
        if (img && img.src) return img.src;
        const canvas = document.querySelector("#qrcode-container canvas");
        if (canvas) return canvas.toDataURL("image/png");
        return null;
    }

    function downloadQR() {
        const url = getQRDataUrl();
        if(url) {
            const link = document.createElement("a");
            link.href = url;
            link.download = "qr-code.png";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }

    function printQR() {
        const url = getQRDataUrl();
        if(url) {
            const printWindow = window.open('', '_blank', 'height=600,width=600');
            printWindow.document.write('<html><head><title>Print QR Code</title>');
            printWindow.document.write('</head><body style="display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">');
            printWindow.document.write('<img src="' + url + '" style="max-width:100%;">');
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.focus();
            
            // Wait for image to load in new window before printing
            setTimeout(() => {
                printWindow.print();
                printWindow.close();
            }, 500);
        }
    }
</script>

<style>
    @media (max-width: 768px) {
        .qr-generator-grid {
            grid-template-columns: 1fr !important;
        }
    }
</style>
{% endblock %}
